<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XX篮球馆 - 个人中心</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-header {
            position: relative;
            margin-bottom: var(--spacing-xl);
        }
        .profile-card {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--accent) 100%);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            color: var(--white);
            overflow: hidden;
        }
        .profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
        }
        .profile-info {
            display: flex;
            align-items: center;
            gap: var(--spacing);
            margin-bottom: var(--spacing-lg);
            position: relative;
            z-index: 1;
        }
        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-full);
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .profile-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .profile-phone {
            font-size: 14px;
            opacity: 0.8;
        }
        .profile-stats {
            display: flex;
            gap: var(--spacing-lg);
            position: relative;
            z-index: 1;
        }
        .profile-stat {
            text-align: center;
        }
        .profile-stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .profile-stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        .menu-group {
            background: var(--white);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: var(--spacing);
            padding: var(--spacing);
            border-bottom: 1px solid var(--gray-100);
            transition: background var(--transition);
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item:hover {
            background: var(--gray-50);
        }
        .menu-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            background: var(--gray-100);
            color: var(--gray-600);
        }
        .menu-icon svg {
            width: 20px;
            height: 20px;
        }
        .menu-icon.primary {
            background: var(--primary-light);
            color: var(--primary);
        }
        .menu-icon.success {
            background: var(--success-light);
            color: var(--success);
        }
        .menu-icon.warning {
            background: var(--warning-light);
            color: var(--warning);
        }
        .menu-text {
            flex: 1;
        }
        .menu-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--gray-900);
        }
        .menu-desc {
            font-size: 12px;
            color: var(--gray-500);
        }
        .menu-arrow {
            color: var(--gray-400);
        }
        .menu-arrow svg {
            width: 20px;
            height: 20px;
        }
        .student-card {
            display: flex;
            align-items: center;
            gap: var(--spacing);
            padding: var(--spacing);
            background: var(--gray-50);
            border-radius: var(--radius);
            margin-bottom: var(--spacing);
        }
        .student-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 16px;
            font-weight: 600;
        }
        .student-info {
            flex: 1;
        }
        .student-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-900);
        }
        .student-relation {
            font-size: 12px;
            color: var(--gray-500);
        }
        .student-qr {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gray-200);
            border-radius: var(--radius);
        }
        .student-qr svg {
            width: 20px;
            height: 20px;
            color: var(--gray-600);
        }
        .add-student {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            padding: var(--spacing);
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius);
            color: var(--gray-500);
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .add-student:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        .logout-btn {
            display: block;
            width: 100%;
            padding: var(--spacing);
            background: var(--white);
            border-radius: var(--radius-lg);
            text-align: center;
            color: var(--danger);
            font-size: 15px;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
<body>
    <!-- Bottom Navigation -->

                <polyline points="9 22 9 12 15 12 15 22"></polyline>

        <a href="venue.html" class="tabbar-item">

        <a href="profile.html" class="tabbar-item active">

    </nav>

    <main class="main-content">
        <!-- Profile Header -->

                    </div>

        <!-- Students Management -->

            <div class="student-card">

                        <rect x="14" y="18" width="3" height="3"></rect>
                        <rect x="18" y="18" width="3" height="3"></rect>
                    </svg>
                </div>
            </div>
            <div class="add-student">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>

        <!-- Orders & Appointments -->

            <div class="menu-group">
                <a href="order-list.html" class="menu-item">

                    </div>
                    <div class="menu-arrow">

                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>

                <a href="appointment-list.html" class="menu-item">

                    </div>
                    <div class="menu-text">

                        <div class="menu-desc">场地预约、课程预约</div>
                    </div>
                    <div class="menu-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </a>
                <a href="class-record.html" class="menu-item">

                    </div>
                    <div class="menu-text">

                    </div>

                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>

            </div>
        </section>

        <!-- Account Management -->
        <section class="section">
            <div class="menu-group">
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                    </div>
                    <div class="menu-text">
                        <div class="menu-title">我的会员卡</div>
                        <div class="menu-desc">查看会员权益</div>
                    </div>
                    <div class="menu-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">

                            <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path>
                            <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path>

                    </div>

                        <div class="menu-title">我的钱包</div>

                    </div>
                    <div class="menu-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </a>
            </div>
        </section>

        <!-- Settings -->
        <section class="section">
            <div class="menu-group">
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </div>
                    <div class="menu-text">
                        <div class="menu-title">设置</div>
                        <div class="menu-desc">消息通知、隐私设置</div>
                    </div>
                    <div class="menu-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                    </div>
                    <div class="menu-text">
                        <div class="menu-title">帮助与反馈</div>
                        <div class="menu-desc">常见问题、联系客服</div>
                    </div>
                    <div class="menu-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </div>
                    <div class="menu-text">
                        <div class="menu-title">关于我们</div>
                        <div class="menu-desc">了解XX篮球馆</div>
                    </div>
                    <div class="menu-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </a>
            </div>
        </section>

        <!-- Logout -->
        <section class="section" style="padding-bottom: var(--spacing-2xl);">
            <a href="#" class="logout-btn">退出登录</a>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const title = this.querySelector('.menu-title').textContent;
                showToast('点击: ' + title);
            });
        });

        document.querySelector('.add-student').addEventListener('click', function() {
            showToast('添加学员功能');
        });
    </script>
</body>
</html>

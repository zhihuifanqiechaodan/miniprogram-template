<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XX篮球馆 - 我的预约</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .appointment-tabs {
            display: flex;
            background: var(--white);
            margin-bottom: var(--spacing);
        }
        .appointment-tab {
            flex: 1;
            padding: var(--spacing);
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-500);
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all var(--transition);
        }
        .appointment-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .appointment-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .appointment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing);
            border-bottom: 1px solid var(--gray-100);
        }
        .appointment-type {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .appointment-type-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            font-size: 16px;
        }
        .appointment-type-icon.court {
            background: var(--primary-light);
            color: var(--primary);
        }
        .appointment-type-icon.course {
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            color: white;
        }
        .appointment-type-name {
            font-weight: 600;
            color: var(--gray-900);
        }
        .appointment-status {
            font-size: 12px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: var(--radius-full);
        }
        .appointment-status.upcoming {
            background: var(--warning-light);
            color: var(--warning);
        }
        .appointment-status.today {
            background: var(--success-light);
            color: var(--success);
        }
        .appointment-status.completed {
            background: var(--gray-100);
            color: var(--gray-600);
        }
        .appointment-body {
            padding: var(--spacing);
        }
        .appointment-info-row {
            display: flex;
            gap: var(--spacing);
            margin-bottom: var(--spacing-sm);
            font-size: 14px;
            color: var(--gray-600);
        }
        .appointment-info-row:last-child {
            margin-bottom: 0;
        }
        .appointment-info-label {
            width: 60px;
            color: var(--gray-500);
        }
        .appointment-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
            padding: var(--spacing);
            border-top: 1px solid var(--gray-100);
        }
        .qr-section {
            background: var(--gray-50);
            padding: var(--spacing);
            text-align: center;
            border-radius: var(--radius);
            margin-bottom: var(--spacing);
        }
        .qr-placeholder {
            width: 120px;
            height: 120px;
            background: var(--white);
            margin: 0 auto var(--spacing-sm);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .qr-tip {
            font-size: 12px;
            color: var(--gray-500);
        }
    </style>
</head>
<body>
    <nav class="tabbar">
        <a href="index.html" class="tabbar-item">
            <svg class="tabbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="tabbar-label">首页</span>
        </a>
        <a href="venue.html" class="tabbar-item">
            <svg class="tabbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
            <span class="tabbar-label">场地</span>
        </a>
        <a href="course.html" class="tabbar-item">
            <svg class="tabbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span class="tabbar-label">课程</span>
        </a>
        <a href="profile.html" class="tabbar-item active">
            <svg class="tabbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="tabbar-label">我的</span>
        </a>
    </nav>

    <main class="main-content" style="padding-top: var(--spacing);">
        <div class="page-header" style="padding: 0 var(--spacing) var(--spacing);">
            <h1 class="page-title">我的预约</h1>
        </div>

        <!-- Tabs -->
        <div class="appointment-tabs">
            <div class="appointment-tab active">今日</div>
            <div class="appointment-tab">即将到来</div>
            <div class="appointment-tab">历史记录</div>
        </div>

        <div style="padding: 0 var(--spacing);">
            <!-- Today's Course -->
            <div class="appointment-card">
                <div class="appointment-header">
                    <div class="appointment-type">
                        <div class="appointment-type-icon course">🏀</div>
                        <span class="appointment-type-name">篮球启蒙班</span>
                    </div>
                    <span class="appointment-status today">今日上课</span>
                </div>
                <div class="appointment-body">
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">时间</span>
                        <span>09:00 - 10:30</span>
                    </div>
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">场地</span>
                        <span>1号全场</span>
                    </div>
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">教练</span>
                        <span>张教练</span>
                    </div>
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">学员</span>
                        <span>张小明</span>
                    </div>
                </div>
                <a href="student-qr.html" class="qr-section">
                    <div class="qr-placeholder">📱</div>
                    <p class="qr-tip">签到二维码，向教练出示即可</p>
                </a>
                <div class="appointment-footer">
                    <button class="btn btn-outline" onclick="showToast('请假')">请假</button>
                    <button class="btn btn-primary" onclick="showToast('签到成功')">签到</button>
                </div>
            </div>

            <!-- Upcoming Venue Booking -->
            <div class="appointment-card">
                <div class="appointment-header">
                    <div class="appointment-type">
                        <div class="appointment-type-icon court">🏀</div>
                        <span class="appointment-type-name">1号全场预订</span>
                    </div>
                    <span class="appointment-status upcoming">即将到来</span>
                </div>
                <div class="appointment-body">
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">日期</span>
                        <span>2025年1月25日 周六</span>
                    </div>
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">时间</span>
                        <span>14:00 - 16:00</span>
                    </div>
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">时长</span>
                        <span>2小时</span>
                    </div>
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">金额</span>
                        <span>¥240</span>
                    </div>
                </div>
                <div class="appointment-footer">
                    <button class="btn btn-outline" onclick="showToast('取消预约')">取消预约</button>
                    <a href="order-detail.html" class="btn btn-primary">查看详情</a>
                </div>
            </div>

            <!-- Completed -->
            <div class="appointment-card">
                <div class="appointment-header">
                    <div class="appointment-type">
                        <div class="appointment-type-icon course">🏀</div>
                        <span class="appointment-type-name">成人提高班</span>
                    </div>
                    <span class="appointment-status completed">已上完</span>
                </div>
                <div class="appointment-body">
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">日期</span>
                        <span>2025年1月22日 周三</span>
                    </div>
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">时间</span>
                        <span>19:00 - 20:30</span>
                    </div>
                    <div class="appointment-info-row">
                        <span class="appointment-info-label">场地</span>
                        <span>2号全场</span>
                    </div>
                </div>
                <div class="appointment-footer">
                    <a href="class-record.html" class="btn btn-outline">上课记录</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.querySelectorAll('.appointment-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.appointment-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>

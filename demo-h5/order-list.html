<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XX篮球馆 - 我的订单</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .order-filter-tabs {
            display: flex;
            gap: var(--spacing);
            padding: var(--spacing);
            background: var(--white);
            margin-bottom: var(--spacing);
            overflow-x: auto;
        }
        .order-filter-tab {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            transition: all var(--transition);
        }
        .order-filter-tab.active {
            background: var(--primary);
            color: var(--white);
        }
        .order-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing);
            border-bottom: 1px solid var(--gray-100);
        }
        .order-id {
            font-size: 13px;
            color: var(--gray-500);
        }
        .order-status {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: var(--radius-full);
        }
        .order-status.paid {
            background: var(--success-light);
            color: var(--success);
        }
        .order-status.pending {
            background: var(--warning-light);
            color: var(--warning);
        }
        .order-status.completed {
            background: var(--gray-100);
            color: var(--gray-600);
        }
        .order-card-body {
            display: flex;
            gap: var(--spacing);
            padding: var(--spacing);
        }
        .order-image {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--gray-100) 0%, var(--gray-200) 100%);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }
        .order-info {
            flex: 1;
        }
        .order-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: var(--spacing-xs);
        }
        .order-meta {
            font-size: 13px;
            color: var(--gray-500);
            margin-bottom: var(--spacing-sm);
        }
        .order-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }
        .order-card-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
            padding: var(--spacing);
            border-top: 1px solid var(--gray-100);
        }
        .order-empty {
            text-align: center;
            padding: var(--spacing-2xl);
            color: var(--gray-400);
        }
        .order-empty-icon {
            font-size: 64px;
            margin-bottom: var(--spacing);
        }
    </style>
</head>
<body>
    <nav class="tabbar">
        <a href="index.html" class="tabbar-item">
            <svg class="tabbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="tabbar-label">首页</span>
        </a>
        <a href="venue.html" class="tabbar-item">
            <svg class="tabbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
            <span class="tabbar-label">场地</span>
        </a>
        <a href="course.html" class="tabbar-item">
            <svg class="tabbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span class="tabbar-label">课程</span>
        </a>
        <a href="profile.html" class="tabbar-item active">
            <svg class="tabbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="tabbar-label">我的</span>
        </a>
    </nav>

    <main class="main-content" style="padding-top: var(--spacing);">
        <div class="page-header" style="padding: 0 var(--spacing) var(--spacing);">
            <h1 class="page-title">我的订单</h1>
        </div>

        <!-- Filter Tabs -->
        <div class="order-filter-tabs">
            <div class="order-filter-tab active">全部</div>
            <div class="order-filter-tab">待支付</div>
            <div class="order-filter-tab">已支付</div>
            <div class="order-filter-tab">已完成</div>
            <div class="order-filter-tab">已取消</div>
        </div>

        <!-- Order List -->
        <div style="padding: 0 var(--spacing);">
            <!-- Course Order -->
            <a href="order-detail.html" class="order-card">
                <div class="order-card-header">
                    <span class="order-id">订单号：202501230001</span>
                    <span class="order-status paid">已支付</span>
                </div>
                <div class="order-card-body">
                    <div class="order-image">🏀</div>
                    <div class="order-info">
                        <h3 class="order-name">篮球启蒙班</h3>
                        <p class="order-meta">2025.01.15 购买 · 12节课时</p>
                        <span class="order-price">¥1,980</span>
                    </div>
                </div>
                <div class="order-card-footer">
                    <button class="btn btn-outline">查看详情</button>
                </div>
            </a>

            <!-- Venue Order -->
            <a href="order-detail.html" class="order-card">
                <div class="order-card-header">
                    <span class="order-id">订单号：202501220001</span>
                    <span class="order-status completed">已完成</span>
                </div>
                <div class="order-card-body">
                    <div class="order-image">🏀</div>
                    <div class="order-info">
                        <h3 class="order-name">1号全场预订</h3>
                        <p class="order-meta">2025.01.22 · 14:00-16:00 · 2小时</p>
                        <span class="order-price">¥240</span>
                    </div>
                </div>
                <div class="order-card-footer">
                    <button class="btn btn-outline">再次预订</button>
                </div>
            </a>

            <!-- Pending Order -->
            <a href="order-detail.html" class="order-card">
                <div class="order-card-header">
                    <span class="order-id">订单号：202501240001</span>
                    <span class="order-status pending">待支付</span>
                </div>
                <div class="order-card-body">
                    <div class="order-image">🏀</div>
                    <div class="order-info">
                        <h3 class="order-name">一对一私教课</h3>
                        <p class="order-meta">2025.01.25 预约 · 1节课时</p>
                        <span class="order-price">¥350</span>
                    </div>
                </div>
                <div class="order-card-footer">
                    <button class="btn btn-primary">立即支付</button>
                    <button class="btn btn-outline">取消订单</button>
                </div>
            </a>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.querySelectorAll('.order-filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.order-filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
